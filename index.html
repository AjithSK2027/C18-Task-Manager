<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C18 Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- LOGIN -->
    <div id="loginSection" class="login-wrap">
        <div class="login-card">
            <div class="brand">
                <span class="brand-mark">C18</span>
                <span class="brand-label">Operations</span>
            </div>
            <h1>Task Manager</h1>
            <p class="login-sub">Select your name to continue</p>
            <select id="userSelect"></select>
            <button id="loginBtn" class="btn btn-primary btn-full">Enter Workspace →</button>
        </div>
    </div>

    <!-- APP -->
    <div id="appSection" style="display:none;">

        <aside class="sidebar">
            <div class="brand">
                <span class="brand-mark">C18</span>
                <span class="brand-label">Operations</span>
            </div>
            <nav class="nav">
                <button class="nav-item active" data-view="tasks" onclick="showView('tasks')">📋 Tasks</button>
            </nav>
            <div class="user-chip">
                <div class="user-avatar" id="userAvatar"></div>
                <div>
                    <div class="user-name" id="userName"></div>
                    <div class="user-role" id="userRole"></div>
                </div>
                <button class="logout-btn" id="logoutBtn" title="Logout">↩</button>
            </div>
        </aside>

        <main class="main">

            <!-- TASKS VIEW (only view — create task is a modal) -->
            <div id="viewTasks">
                <div class="page-header">
                    <h2>All Tasks</h2>
                    <div class="header-actions">
                        <button class="btn btn-ghost" id="refreshBtn">🔄 Refresh</button>
                        <button class="btn btn-secondary" id="sendEodWhatsAppBtn">📢 EOD Report</button>
                        <button class="btn btn-primary" id="newTaskBtn" style="display:none;">＋ New Task</button>
                    </div>
                </div>

                <div class="filters">
                    <select id="filterProperty"><option value="">All Properties</option></select>
                    <select id="filterDept"><option value="">All Departments</option></select>
                    <select id="filterStatus">
                        <option value="">All Status</option>
                        <option>To Do</option>
                        <option>In Progress</option>
                        <option>Done</option>
                        <option>Pending</option>
                        <option>Blocked</option>
                    </select>
                </div>

                <div id="taskBoard"></div>
            </div>

        </main>
    </div>

    <!-- TOAST -->
    <div id="toast"></div>

    <!-- CREATE TASK MODAL -->
    <div id="createModal" class="modal-overlay" style="display:none;">
        <div class="modal-card modal-wide">
            <h3>Create New Task</h3>
            <div class="form-grid">
                <div class="form-group form-full">
                    <label>Task Title *</label>
                    <input type="text" id="taskTitle" placeholder="Describe the task clearly…">
                </div>
                <div class="form-group">
                    <label>Property</label>
                    <select id="taskProperty"></select>
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <select id="taskDept"></select>
                </div>
                <div class="form-group">
                    <label>Assign To</label>
                    <select id="taskAssignee"></select>
                </div>
                <div class="form-group">
                    <label>Due Date</label>
                    <input type="date" id="taskDueDate">
                </div>
                <div class="form-group form-full">
                    <label>Description</label>
                    <textarea id="taskDesc" placeholder="Additional details, notes, or links…" rows="3"></textarea>
                </div>
            </div>
            <div class="form-actions" style="margin-top:20px;">
                <button class="btn btn-ghost" onclick="closeCreateModal()">Cancel</button>
                <button class="btn btn-primary" id="createTaskBtn">Create Task →</button>
            </div>
        </div>
    </div>

    <!-- EDIT / COMMENT / ATTACHMENT MODAL -->
    <div id="modal" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <h3 id="modalTitle">Edit Task</h3>
            <div id="modalBody"></div>
            <div class="form-actions">
                <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" id="modalSaveBtn">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
