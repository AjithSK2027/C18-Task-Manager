<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C18 Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>C18 Operations - Task Manager</h1>
        <div id="loginSection">
            <label>Select your name:</label>
            <select id="userSelect"></select>
            <button id="loginBtn">Login</button>
        </div>
        <div id="appSection" style="display:none;">
            <div class="header">
                <h2>Welcome, <span id="userName"></span> (<span id="userRole"></span>)</h2>
                <button id="logoutBtn">Logout</button>
            </div>
            <div class="filters">
                <select id="filterProperty"><option value="">All Properties</option></select>
                <select id="filterDept"><option value="">All Departments</option></select>
                <select id="filterStatus"><option value="">All Status</option></select>
            </div>
            <div id="taskBoard"></div>
            <div id="addTaskForm" style="display:none;">
                <h3>Create New Task</h3>
                <input type="text" id="taskTitle" placeholder="Task title" required>
                <select id="taskProperty"></select>
                <select id="taskDept"></select>
                <select id="taskAssignee"></select>
                <input type="date" id="taskDueDate">
                <textarea id="taskDesc" placeholder="Description"></textarea>
                <button id="createTaskBtn">Create Task</button>
            </div>
            <div>
                <button id="sendEodWhatsAppBtn">📢 Send EOD Report to WhatsApp Heads</button>
                <button id="refreshBtn">🔄 Refresh Tasks</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
